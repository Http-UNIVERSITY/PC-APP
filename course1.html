<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC-APP Course</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* Header */
.header{
    padding:20px;
    background:#111a2e;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:18px;
    color:#4da3ff;
}

/* Section */
.section{
    padding:15px;
}

/* Video Cards */
.video-card{
    background:#141f35;
    border-radius:15px;
    padding:10px;
    margin-bottom:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

video{
    width:100%;
    border-radius:10px;
}

/* Image Gallery */
.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.img-card{
    background:#141f35;
    border-radius:15px;
    overflow:hidden;
}

.img-card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

/* Titles */
.title{
    margin:15px 0 10px;
    font-size:16px;
    color:#4da3ff;
}

</style>
</head>

<body>

<div class="header">
    <h1>PC-APP COURSE</h1>
    <div>User</div>
</div>

<div class="section">

    <!-- VIDEOS FIRST -->
    <div class="title">🎬 Course Videos</div>

    <div class="video-card">
        <video controls>
            <source src="video.mp4" type="video/mp4">
        </video>
        <p>Intro HTML Lesson</p>
    </div>

    <div class="video-card">
        <video controls>
            <source src="video2.mp4" type="video/mp4">
        </video>
        <p>CSS Basics</p>
    </div>

    <!-- IMAGES AFTER -->
    <div class="title">🖼️ Learning Images</div>

    <div class="gallery">
        <div class="img-card">
            <img src="video.jpg">
        </div>

        <div class="img-card">
            <img src="img2.jpg">
        </div>

        <div class="img-card">
            <img src="img3.jpg">
        </div>

        <div class="img-card">
            <img src="img4.jpg">
        </div>
    </div>

</div>

</body>
</html>
