<!DOCTYPE html>
<html lang="fa">

    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COURSE VIDEO</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#050b1a,#0a1a33);
    color:white;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.topbar h2{
    color:#4ea1ff;
}

/* CONTAINER */
.container{
    display:flex;
    gap:20px;
    padding:20px;
}

/* VIDEO */
.video-box{
    flex:2;
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
}

video{
    width:100%;
    border-radius:15px;
}

/* LESSON LIST */
.lessons{
    flex:1;
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    height:80vh;
    overflow:auto;
}

.lesson{
    padding:10px;
    margin:10px 0;
    background:rgba(255,255,255,0.06);
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.lesson:hover{
    background:#4ea1ff;
    color:black;
}

/* TITLE */
.title{
    margin:10px 0;
    color:#4ea1ff;
}
</style>
</head>

<body>


    
<!-- TOP -->
<div class="topbar">
    <h2>🎓 PC-APP Course</h2>
    <div><i class="fa fa-user"></i> User</div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- VIDEO -->
    <div class="video-box">
        <h3 class="title" id="videoTitle">Intro Video</h3>

        <video id="videoPlayer" controls>
            <source src="movie.mp4" type="video/mp4">
        </video>

        <p style="margin-top:10px;color:#aaa;">
            این درس را مشاهده کنید و تمرین انجام دهید
        </p>
    </div>

    <!-- LESSON LIST -->
    <div class="lessons">

        <div class="lesson" onclick="changeVideo('video1.mp4','Intro JAVA')">
            📘 Intro JAVA
        </div>

        <div class="lesson" onclick="changeVideo('video2.mp4','Tags & Elements')">
            📗 Tags & Elements
        </div>

        <div class="lesson" onclick="changeVideo('video3.mp4','Forms ')">
            📕 Forms
        </div>

        <div class="lesson" onclick="changeVideo('video4.mp4','connector')">
            🎨 CONNECTOR 
        </div>

    </div>

</div>
<img src="12345.jpg">
  <img src="123456.jpg">
<script>
function changeVideo(src, title){
    document.getElementById("videoPlayer").src = src;
    document.getElementById("videoTitle").innerText = title;
}
</script>

</body>
</html>
