<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Learn Page</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08152e;
    color:white;
}

header{
    background:#121b33;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
}

header h1{
    margin:0;
    font-size:28px;
}

header a{
    color:white;
    text-decoration:none;
    font-size:20px;
}

.container{
    padding:20px;
}

h2{
    color:#4b8dff;
}

video{
    width:100%;
    max-width:500px;
    border-radius:5px;
    margin-bottom:35px;
}

.image-box{
    margin-top:20px;
}

.image-box img{
    width:220px;
    border-radius:10px;
    border:2px solid #4b8dff;
}

.image-box p{
    font-size:22px;
    margin-bottom:10px;
}
</style>

</head>
<body>

<header>
<h1>🎓 FIRST LEARN PAGE</h1>
<a href="#">HOME</a>
</header>

<div class="container">

<h2>PC-APP Video</h2>
<video controls>
<source src="video1.mp4" type="video/mp4">
</video>

<h2>PC-APP Video1</h2>
<video controls>
<source src="video2.mp4" type="video/mp4">
</video>

<div class="image-box">
<p>🖼 Free PC-APP Image</p>

<img src="photo.jpg" alt="Image">

</div>

</div>

</body>
</html>
