<!DOCTYPE html>
<html lang="fa">

    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COURSE MANAGEMENT</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#050b1a,#0a1a33);
    color:white;
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:20px;
    transition:0.3s;
}

.sidebar h2{
    color:#4ea1ff;
    text-align:center;
    margin-bottom:30px;
}

.menu a{
    display:flex;
    gap:10px;
    padding:12px;
    margin:8px 0;
    color:white;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
}

.menu a:hover{
    background:#4ea1ff;
    color:black;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search{
    width:300px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:20px;
    border-radius:15px;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px);
    background:#4ea1ff;
    color:black;
}

.card i{
    font-size:24px;
    margin-bottom:10px;
}

/* COURSES */
.courses{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.course{
    background:rgba(255,255,255,0.06);
    padding:15px;
    border-radius:15px;
    transition:0.3s;
}

.course:hover{
    transform:scale(1.03);
}

.progress{
    height:8px;
    background:#111;
    border-radius:20px;
    margin-top:10px;
    overflow:hidden;
}

.progress-bar{
    height:8px;
    background:#4ea1ff;
}

.btn{
    margin-top:10px;
    padding:8px 12px;
    background:#4ea1ff;
    border:none;
    color:black;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎓 Course APP</h2>

    <div class="menu">
    
        <a href="manage.html"><i class="fa fa-book"></i> APP COURSE</a>
        <a href="ide.html"><i class="fa fa-play"></i> SETUP&IDE</a>
         <a href="vip.html"><i class="fa fa-play"></i> VIP COURSE</a>
        <a href="profile.html"><i class="fa fa-user"></i> PROFILE</a>
        <a href="setting.html"><i class="fa fa-gear"></i> SETTING</a>
         
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <input class="search" placeholder="SEARCH COURSE">
        <div>👤FAKHRUDINAZAMI</div>
    </div>

    <!-- STATS -->
    <div class="cards">

        <div class="card">
            <i class="fa fa-book"></i>
            <h3>2 COURSE</h3>
            <p>APP COURSE </p>
        </div>

        <div class="card">
            <i class="fa fa-video"></i>
            <h3>48 SUBJECT</h3>
            <p>VIDEO ACCTIVE </p>
        </div>

        <div class="card">
            <i class="fa fa-clock"></i>
            <h3>82 HOURS</h3>
            <p>DURATION UNDERSTAND</p>
        </div>

        

    </div>

    <!-- COURSES -->
    <h2 style="margin-top:30px;">📚 COURSES ACCTIVE</h2>

    <div class="courses">

        <div class="course">
            <h3>HTML & CSS</h3>
            <p>START FROM ZERO TO PROGRESS</p>
            <div class="progress">
                <div class="progress-bar" style="width:80%"></div>
            </div>
            <button class="btn">CONTINUE</button>
        </div>

        <div class="course">
            <h3>JavaScript</h3>
            <p>CODE AND PROGRAMING</p>
            <div class="progress">
                <div class="progress-bar" style="width:55%"></div>
            </div>
            <button class="btn">CONTINUE</button>
        </div>

    </div>

</div>

</body>
</html>
