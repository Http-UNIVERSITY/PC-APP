<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Course</title>

<style>

    margin:0;

    background:#0f0f2a;

}

/* BUY PAGE */
#buyPage{

}

/* COURSE PAGE */
#coursePage{

}

/* BUTTON */

    padding:15px;
    width:80%;
    background:#ffb300;
    border:none;
    border-radius:12px;

    cursor:pointer;
}

/* VIDEO CARD */
.card{
    background:#1a1a3a;

}
