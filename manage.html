<!DOCTYPE html>
<html lang="fa">

    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANAGE COURSE</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#050b1a,#0a1a33);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    padding:20px;
    height:100vh;
}

.sidebar h2{
    color:#4ea1ff;
    text-align:center;
}

.sidebar a{
    display:block;
    padding:12px;
    margin:8px 0;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.sidebar a:hover{
    background:#4ea1ff;
    color:black;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search{
    width:300px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

/* BUTTON */
.btn{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#4ea1ff;
    color:black;
    cursor:pointer;
    margin-left:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
    background:rgba(78,161,255,0.2);
}

.action-btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.edit{
    background:#ffcc00;
}

.delete{
    background:#ff4d4d;
    color:white;
}

.add-box{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.add-box input{
    padding:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    flex:1;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎓 Admin</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="course.html">📚 Courses web</a>
    <a href="video.html">📚 Courses java</a>
    <a href="#">👤 Users</a>
    <a href="setting.html">⚙️ Settings</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <input class="search" placeholder="🔍 جستجوی کورس..." onkeyup="searchCourse(this.value)">
        <button class="btn" onclick="addCourse()">+ Add Course</button>
    </div>

    <!-- ADD -->
    <div class="add-box">
        <input id="courseName" placeholder="نام کورس جدید">
        <input id="courseLevel" placeholder="سطح (Beginner / Advanced)">
        <button class="btn" onclick="addCourse()">اضافه</button>
    </div>

    <br>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>نام کورس</th>
                <th>سطح</th>
                <th>عملیات</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
let courses = [
    {id:1, name:"HTML & CSS", level:"Beginner"},
    {id:2, name:"JavaScript", level:"Intermediate"},
    {id:3, name:"React JS", level:"Advanced"}
];

function render(data){
    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach(c=>{
        table.innerHTML += `
        <tr>
            <td>${c.id}</td>
            <td>${c.name}</td>
            <td>${c.level}</td>
            <td>
                <button class="action-btn edit" onclick="editCourse(${c.id})">Edit</button>
                <button class="action-btn delete" onclick="deleteCourse(${c.id})">Delete</button>
            </td>
        </tr>
        `;
    });
}

function addCourse(){
    let name = document.getElementById("courseName").value;
    let level = document.getElementById("courseLevel").value;

    if(name==="") return;

    courses.push({
        id: Date.now(),
        name,
        level
    });

    document.getElementById("courseName").value = "";
    document.getElementById("courseLevel").value = "";

    render(courses);
}

function deleteCourse(id){
    courses = courses.filter(c=>c.id!==id);
    render(courses);
}

function editCourse(id){
    let course = courses.find(c=>c.id===id);
    let newName = prompt("نام جدید:", course.name);
    let newLevel = prompt("سطح جدید:", course.level);

    if(newName){
        course.name = newName;
        course.level = newLevel;
    }

    render(courses);
}

function searchCourse(value){
    let filtered = courses.filter(c =>
        c.name.toLowerCase().includes(value.toLowerCase())
    );

    render(filtered);
}

render(courses);
</script>

</body>
</html>
