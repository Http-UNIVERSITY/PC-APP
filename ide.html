<!DOCTYPE html>
<html lang="fa">

    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANAGE COURSE</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#050b1a,#0a1a33);
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    padding:20px;
    height:100vh;
}

.sidebar h2{
    color:#4ea1ff;
    text-align:center;
}

.sidebar a{
    display:block;
    padding:12px;
    margin:8px 0;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.sidebar a:hover{
    background:#4ea1ff;
    color:black;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search{
    width:300px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

/* BUTTON */
.btn{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#4ea1ff;
    color:black;
    cursor:pointer;
    margin-left:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
    background:rgba(78,161,255,0.2);
}

.action-btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.edit{
    background:#ffcc00;
}

.delete{
    background:#ff4d4d;
    color:white;
}

.add-box{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.add-box input{
    padding:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    flex:1;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎓 SETUP&IDE</h2>

    <a href=".html">📊 SETUP&IDE WEB</a>
    <a href=".html">📚 SETUP&IDE PC-APP</a>
    </div>
</body>
</html>
