<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETUP & IDE</title>

<!-- Font Awesome for download icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b1220,#111a2e,#0a0f1d);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* container */
.box{
    width:90%;
    max-width:500px;
    text-align:center;
}

/* title */
h1{
    color:#4da3ff;
    margin-bottom:5px;
}

.sub{
    opacity:0.7;
    margin-bottom:20px;
}

/* card */
.card{
    background:#141f35;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
    text-align:left;
}

/* download button */
.download{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:10px;
    padding:10px 15px;
    background:#4da3ff;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.download i{
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">

    <h1>⚙️ SETUP & IDE</h1>
    <p class="sub">Download Web & PC Tools</p>

    <!-- WEB -->
    <div class="card">
        <h3>📊 SETUP & IDE WEB</h3>
        <p>Online Web IDE Package</p>

        <a href="web-ide.zip" class="download" download>
            Download Web IDE
            <i class="fa-solid fa-download"></i>
        </a>
    </div>

<div class="box">

    <h1>⚙️ SETUP & IDE</h1>
    <p class="sub">Download PC-APP APK</p>

    <!-- PC-APP -->
    <div class="card">
        <h3>📊 SETUP & APK PC-APP</h3>
        <p>Online APK PC-APP</p>

        <a href="web-ide.zip" class="download" download>
            Download APK PC-APP
            <i class="fa-solid fa-download"></i>
        </a>
    </div>
    <!-- PC -->
    <div class="card">
        <h3>📦 SETUP & IDE PC APP</h3>
        <p>PC-APP Desktop Setup</p>

        <a href="pc-app.zip" class="download" download>
            Download PC App
            <i class="fa-solid fa-download"></i>
        </a>
    </div>

</div>

</body>
</html>
