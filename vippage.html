<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Courses</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f2a;
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    background:linear-gradient(135deg,#111133,#1a1a3a);
}

.header h1{
    color:#ffb300;
    margin:0;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:15px;
}

/* VIDEO CARD */
.card{
    background:#1a1a3a;
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    background:#252560;
    transform:scale(1.03);
}

.lock{
    color:#ff5252;
    font-size:18px;
}

/* VIDEO PLAYER */
.player{
    display:none;
    padding:15px;
}

iframe{
    width:100%;
    height:220px;
    border-radius:12px;
}
</style>

</head>
